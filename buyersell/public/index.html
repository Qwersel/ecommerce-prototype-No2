<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyersell</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <a class="brand" href="/">Buyersell</a>
    <nav>
      <a href="/products">Products</a>
      <a href="/add-product">Add Product</a>
      <a href="/orders">Orders</a>
    </nav>
  </header>

  <main>
    <h1>Welcome to Buyersell</h1>
    <p>Browse our products, add items to the catalogue, and purchase using PayPal.</p>

    <h2>Latest Products</h2>
    <div id="product-list" class="product-grid"></div>
    <p><a href="/products">View all products &rarr;</a></p>
  </main>

  <footer>By Mustafa Ersel Algan for App &amp; Web Development</footer>

  <script>
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    fetch('/api/products')
      .then(r => r.json())
      .then(products => {
        const el = document.getElementById('product-list');
        if (!products.length) {
          el.innerHTML = '<p class="empty">No products yet. <a href="/add-product">Add one</a>.</p>';
          return;
        }
        el.innerHTML = products.slice(0, 6).map(p => `
          <div class="product-card">
            ${p.imageData
              ? `<img src="${esc(p.imageData)}" alt="${esc(p.name)}" class="product-card-img">`
              : '<div class="product-card-img-placeholder"></div>'}
            <h3>${esc(p.name)}</h3>
            <div class="price">&pound;${esc(p.price.toFixed(2))}</div>
            <a href="/product/${esc(p._id)}">View</a>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('product-list').innerHTML =
          '<p class="message error">Failed to load products.</p>';
      });
  </script>
</body>
</html>
