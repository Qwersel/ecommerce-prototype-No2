<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Buyersell</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <a class="brand" href="/">Buyersell</a>
    <nav>
      <a href="/products">Products</a>
      <a href="/add-product">Add Product</a>
      <a href="/orders">Orders</a>
    </nav>
  </header>

  <main>
    <h1>Products</h1>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Search by name..." />
      <button onclick="loadProducts()">Search</button>
    </div>

    <div id="product-list" class="product-grid"></div>
  </main>

  <footer>By Mustafa Ersel Algan for App &amp; Web Development</footer>

  <script>
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function loadProducts() {
      const search = document.getElementById('search').value.trim();
      const url = search ? `/api/products?search=${encodeURIComponent(search)}` : '/api/products';
      const el = document.getElementById('product-list');
      el.innerHTML = '<p class="loading">Loading...</p>';

      fetch(url)
        .then(r => r.json())
        .then(products => {
          if (!products.length) {
            el.innerHTML = '<p class="empty">No products found.</p>';
            return;
          }
          el.innerHTML = products.map(p => `
            <div class="product-card">
              ${p.imageData
                ? `<img src="${esc(p.imageData)}" alt="${esc(p.name)}" class="product-card-img">`
                : '<div class="product-card-img-placeholder"></div>'}
              <h3>${esc(p.name)}</h3>
              <div class="price">&pound;${esc(p.price.toFixed(2))}</div>
              <a href="/product/${esc(p._id)}">View</a>
            </div>
          `).join('');
        })
        .catch(() => {
          el.innerHTML = '<p class="message error">Failed to load products.</p>';
        });
    }

    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadProducts();
    });

    loadProducts();
  </script>
</body>
</html>
